<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垂直循环进度条</title>
    <style>
        body {
            background-color: #0D0D0D;
            color: #E0E0E0;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            /* 使用 flex 布局让进度条垂直水平居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .progress-bar {
            width: 20px;
            height: 80px;
            background-color: #444;
            position: relative;
            display: flex;
            align-items: flex-end;
            border-radius: 10px / 50%;
            overflow: hidden;
        }

        .progress {
            width: 100%;
            height: 0%;
            background-color: #455A64;
            transition: height 0.1s linear;
        }
    </style>
</head>
<body>

<div class="progress-bar">
    <div id="progress" class="progress"></div>
</div>

<script>
    let progress = 0;
    let direction = 1;
    let timer;
    let duration = 6000; // 默认6秒
    const steps = 100;

    const progressElement = document.getElementById('progress');

    function updateProgress() {
        progressElement.style.height = `${progress}%`;
    }

    function animateProgress() {
        clearInterval(timer);
        const intervalTime = duration / (steps * 2);

        timer = setInterval(() => {
            progress += direction;
            updateProgress();

            if (progress >= 100) direction = -1;
            else if (progress <= 0) direction = 1;
        }, intervalTime);
    }

    // 初始化动画
    animateProgress();
</script>

</body>
</html>
